<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JASTEB PREMIUM PANEL - V3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen">

    <div class="container mx-auto px-4 py-10 max-w-lg">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-500 tracking-tighter italic">JASTEB <span class="text-white">PRO</span></h1>
            <p class="text-slate-400 text-sm mt-2 font-mono">Status: <span class="text-green-500">SYSTEM ONLINE</span></p>
        </div>

        <div class="bg-[#1e293b] rounded-2xl p-8 border border-slate-700 shadow-2xl">
            <form id="jasteb-form" class="space-y-5">
                
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Email Target (Gmail)</label>
                    <input type="email" name="target_email" id="target_email" required 
                           class="w-full bg-[#0f172a] border border-slate-600 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                           placeholder="target@gmail.com">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Subject Laporan</label>
                    <input type="text" name="subject" id="subject" required 
                           class="w-full bg-[#0f172a] border border-slate-600 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                           placeholder="Peringatan Keamanan / Report #001">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Isi Tebaran</label>
                    <textarea name="message" id="message" rows="4" required
                              class="w-full bg-[#0f172a] border border-slate-600 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                              placeholder="Masukkan teks jasteb kamu..."></textarea>
                </div>

                <button type="submit" id="btn-kirim"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-lg shadow-lg transform active:scale-95 transition-all">
                    TEMBAK SEKARANG
                </button>

            </form>
        </div>

        <p class="text-center text-slate-500 text-[10px] mt-6 tracking-widest">© 2026 JASTEB ELITE - NO LOGS SAVED</p>
    </div>

    <script type="text/javascript">
        // INI ADALAH BAGIAN API KEY
        // Ganti ID di bawah dengan ID yang kamu dapat dari Dashboard EmailJS
        (function() {
            emailjs.init("service_dexnzhe"); // <--- MASUKKAN PUBLIC KEY KAMU DISINI
        })();

        const btn = document.getElementById('btn-kirim');

        document.getElementById('jasteb-form').addEventListener('submit', function(event) {
            event.preventDefault();

            btn.innerText = 'PROSES TEMBAK...';
            btn.disabled = true;

            const serviceID = 'default_service';
            const templateID = 'template_2vdb35a'; // <--- MASUKKAN TEMPLATE ID DISINI

            emailjs.sendForm(serviceID, templateID, this)
                .then(() => {
                    btn.innerText = 'BERHASIL TERKIRIM!';
                    btn.classList.add('bg-green-600');
                    alert('Target Berhasil Di-Jasteb!');
                    setTimeout(() => {
                        btn.innerText = 'TEMBAK LAGI';
                        btn.disabled = false;
                        btn.classList.remove('bg-green-600');
                    }, 3000);
                }, (err) => {
                    btn.innerText = 'GAGAL (API ERROR)';
                    btn.disabled = false;
                    alert('Error: ' + JSON.stringify(err));
                });
        });
    </script>
</body>
</html>
